name: Weekly Data Scrape

on:
  schedule:
    # Every Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests pandas tabulate beautifulsoup4 lxml

      - name: Scrape leaderboards
        run: python3 run.py scrape-lb

      - name: Scrape match histories
        run: python3 run.py scrape-matches

      - name: Scrape cohdb build orders (50 pages)
        run: python3 run.py scrape-cohdb 50

      - name: Backfill winners
        run: python3 backfill_winners.py

      - name: Resolve player sides
        run: python3 resolve_player_sides.py

      - name: Commit and push updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coh3_pro.db
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "Weekly data update ($(date -u +%Y-%m-%d))"
            git push
          fi
